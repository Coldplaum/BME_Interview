<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BME interview</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>My Video</h1>
    <p class="desc">Watch and share this video online.</p>

    <div class="video-box">
      <video controls preload="metadata">
        <source src="videos/video.mp4" type="video/mp4" />

      </video>
    </div>

    <p class="note">
      If the video does not play, please make sure the file is named video.mp4 and placed inside the videos folder.
    </p>
  </main>
